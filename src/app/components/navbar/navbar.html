<header class="navbar" [class.rtl]="isArabic" [class.is-open]="isMenuOpen">
  <div class="navbar__container">
    <a href="#hero" class="navbar__logo" (click)="closeMenu()">
      <img
        class="navbar__logo-img"
        src="/images/redesign-logo.png"
        alt="Re-Design — Paintless Dent Repair Specialist in Kuwait"
        width="56"
        height="56"
      />

    </a>

    <nav class="navbar__links" aria-label="Primary">
      @for (link of navLinks; track link.id) {
      <a [href]="'#' + link.id">
        {{ isArabic ? link.ar : link.en }}
      </a>
      }
    </nav>

    <div class="navbar__actions">
      <button
        class="navbar__theme"
        type="button"
        (click)="toggleTheme()"
        [attr.aria-label]="isLight ? 'Switch to dark mode' : 'Switch to light mode'"
      >
        @if (isLight) {
          <svg viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <path d="M17.5 12.7A8 8 0 0 1 7.3 2.5 7 7 0 1 0 17.5 12.7z"/>
          </svg>
        } @else {
          <svg viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <circle cx="10" cy="10" r="4"/>
            <line x1="10" y1="1" x2="10" y2="3.5"/>
            <line x1="10" y1="16.5" x2="10" y2="19"/>
            <line x1="1" y1="10" x2="3.5" y2="10"/>
            <line x1="16.5" y1="10" x2="19" y2="10"/>
            <line x1="3.58" y1="3.58" x2="5.34" y2="5.34"/>
            <line x1="14.66" y1="14.66" x2="16.42" y2="16.42"/>
            <line x1="3.58" y1="16.42" x2="5.34" y2="14.66"/>
            <line x1="14.66" y1="5.34" x2="16.42" y2="3.58"/>
          </svg>
        }
      </button>

      <button class="navbar__lang" type="button" (click)="switchLanguage()">
        {{ isArabic ? 'EN' : 'عربي' }}
      </button>

    </div>

    <button
      class="navbar__menu-btn"
      type="button"
      [attr.aria-label]="isMenuOpen ? 'Close menu' : 'Open menu'"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="mobile-nav"
      (click)="toggleMenu()"
    >
      <span class="navbar__menu-bars" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>

  <div
    class="navbar__backdrop"
    [class.is-open]="isMenuOpen"
    (click)="closeMenu()"
    aria-hidden="true"
  ></div>

  <div
    id="mobile-nav"
    class="navbar__mobile"
    [class.is-open]="isMenuOpen"
    [attr.aria-hidden]="!isMenuOpen"
    [attr.inert]="!isMenuOpen ? '' : null"
    role="dialog"
    aria-label="Mobile navigation"
  >
    <nav class="navbar__mobile-links" aria-label="Mobile primary">
      @for (link of navLinks; track link.id) {
      <a [href]="'#' + link.id" (click)="closeMenu()">
        {{ isArabic ? link.ar : link.en }}
      </a>
      }
    </nav>

    <div class="navbar__mobile-actions">
      <button
        class="navbar__theme mobile"
        type="button"
        (click)="toggleTheme(); closeMenu()"
        [attr.aria-label]="isLight ? 'Switch to dark mode' : 'Switch to light mode'"
      >
        @if (isLight) {
          <svg viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <path d="M17.5 12.7A8 8 0 0 1 7.3 2.5 7 7 0 1 0 17.5 12.7z"/>
          </svg>
        } @else {
          <svg viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <circle cx="10" cy="10" r="4"/>
            <line x1="10" y1="1" x2="10" y2="3.5"/>
            <line x1="10" y1="16.5" x2="10" y2="19"/>
            <line x1="1" y1="10" x2="3.5" y2="10"/>
            <line x1="16.5" y1="10" x2="19" y2="10"/>
            <line x1="3.58" y1="3.58" x2="5.34" y2="5.34"/>
            <line x1="14.66" y1="14.66" x2="16.42" y2="16.42"/>
            <line x1="3.58" y1="16.42" x2="5.34" y2="14.66"/>
            <line x1="14.66" y1="5.34" x2="16.42" y2="3.58"/>
          </svg>
        }
      </button>

      <button class="navbar__lang mobile" type="button" (click)="switchLanguage(); closeMenu()">
        {{ isArabic ? 'EN' : 'عربي' }}
      </button>
    </div>
  </div>
</header>
