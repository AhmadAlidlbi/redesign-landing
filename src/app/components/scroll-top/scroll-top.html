<button
  *ngIf="enabled && visible"
  type="button"
  class="to-top"
  (click)="scrollToTop()"
  aria-label="Scroll to top"
  title="Back to top"
>
  <svg class="to-top__icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
    <path d="M9 15V3M3.5 8.5L9 3l5.5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
